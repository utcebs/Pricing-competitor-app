name: Build to /docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# On every push to main, build and commit the output to /docs/ so
# Pages (Source: Deploy from branch → main → /docs) serves the built
# app directly. Avoids the Pages Source config dance.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (prevents loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync dist -> docs
        run: |
          rm -rf docs
          mkdir docs
          cp -r dist/* docs/
          touch docs/.nojekyll

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: rebuild /docs [skip ci]"
          git push
