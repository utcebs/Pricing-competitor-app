name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Modern gh-pages deploy — uploads a Pages artifact and deploys via
# the official actions/deploy-pages action. Sidesteps the branch-based
# "Deploy from a branch" config entirely. In Settings → Pages you set
# Source = "GitHub Actions" (not a branch).
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time — cancel earlier queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
