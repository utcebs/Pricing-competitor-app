name: Worker · Tick shard 1 (every 5 min)

# Shard 1 of 3 — processes queued scrape_runs where
# (competitor_id % 3) === 1. See worker-tick.yml for architecture notes.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/worker-tick-shard-1.yml'

concurrency:
  group: worker-tick-shard-1
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.48-${{ runner.os }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: worker
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: worker
        run: npx playwright install-deps chromium

      - name: Run tick (shard 1/3)
        working-directory: worker
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM:                ${{ secrets.ALERT_FROM }}
          HTTP_PROXY:                ${{ secrets.HTTP_PROXY }}
          SHARD_INDEX: '1'
          SHARD_COUNT: '3'
        run: node src/tick.js
